<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Booking Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Hotel Booking Form</h2>

        <form id="bookingForm">

            <!-- Check-in -->
            <div class="mb-3">
                <label class="form-label">Check-in Date *</label>
                <input type="date" class="form-control" id="checkin" required>
                <small class="text-danger" id="checkinError"></small>
            </div>

            <!-- Check-out -->
            <div class="mb-3">
                <label class="form-label">Check-out Date *</label>
                <input type="date" class="form-control" id="checkout" required>
                <small class="text-danger" id="checkoutError"></small>
            </div>

            <!-- Room Type -->
            <div class="mb-3">
                <label class="form-label">Room Type *</label>
                <select class="form-select" id="roomType" required>
                    <option value="">Select Room Type</option>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Suite">Suite</option>
                </select>
            </div>

            <!-- Guest Count -->
            <div class="mb-3">
                <label class="form-label">Number of Guests *</label>
                <input type="number" class="form-control" id="guests" min="1" max="10" required>
            </div>

            <!-- Special Requests -->
            <div class="mb-3">
                <label class="form-label">Special Requests (Optional)</label>
                <textarea class="form-control" id="requests" rows="3"></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">Book Now</button>

            <div class="mt-3 text-center text-success" id="successMessage"></div>

        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
